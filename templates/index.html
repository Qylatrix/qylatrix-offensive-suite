<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qylatrix | The Syntax of Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --qylatrix-black: #030712;
            --qylatrix-dark: #0f172a;
            --qylatrix-primary: #0077ff;
            --qylatrix-primary-glow: rgba(0, 119, 255, 0.4);
            --qylatrix-cyan: #00f0ff;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--qylatrix-black);
            color: #e0e0e0;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 119, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--qylatrix-cyan), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(0, 240, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }

        .glass-panel:hover::before {
            opacity: 1;
        }

        .btn-qylatrix {
            background: transparent;
            border: 1px solid var(--qylatrix-primary);
            color: white;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .btn-qylatrix::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.2), transparent);
            transition: all 0.4s ease;
        }

        .btn-qylatrix:hover {
            background: rgba(0, 119, 255, 0.1);
            box-shadow: 0 0 15px var(--qylatrix-primary-glow);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            border-color: var(--qylatrix-cyan);
        }

        .btn-qylatrix:hover::after {
            left: 100%;
        }

        input,
        select,
        textarea {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid #1e293b !important;
            color: #fff !important;
            transition: all 0.3s ease !important;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem !important;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--qylatrix-cyan) !important;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2) !important;
            outline: none !important;
        }

        .glitch-text {
            position: relative;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--qylatrix-black);
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -1px 0 var(--qylatrix-cyan);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -1px 0 var(--qylatrix-primary);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% {
                clip: rect(10px, 9999px, 83px, 0);
            }

            20% {
                clip: rect(66px, 9999px, 14px, 0);
            }

            40% {
                clip: rect(72px, 9999px, 8px, 0);
            }

            60% {
                clip: rect(6px, 9999px, 93px, 0);
            }

            80% {
                clip: rect(44px, 9999px, 2px, 0);
            }

            100% {
                clip: rect(18px, 9999px, 33px, 0);
            }
        }

        @keyframes glitch-anim2 {
            0% {
                clip: rect(65px, 9999px, 100px, 0);
            }

            20% {
                clip: rect(3px, 9999px, 40px, 0);
            }

            40% {
                clip: rect(50px, 9999px, 15px, 0);
            }

            60% {
                clip: rect(80px, 9999px, 60px, 0);
            }

            80% {
                clip: rect(20px, 9999px, 90px, 0);
            }

            100% {
                clip: rect(40px, 9999px, 10px, 0);
            }
        }

        /* Terminal Output Style */
        .terminal-output {
            background: #020617;
            border-left: 2px solid var(--qylatrix-cyan);
            font-family: 'JetBrains Mono', monospace;
            padding: 1rem;
            position: relative;
        }

        .terminal-output::before {
            content: '>_';
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            color: rgba(255, 255, 255, 0.2);
            font-weight: bold;
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-12">

        <!-- Navbar / Header -->
        <header class="flex flex-col md:flex-row justify-between items-center py-6 border-b border-slate-800">
            <div class="flex items-center space-x-4">
                <!-- Authentic Qylatrix Logo -->
                <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00f0ff" />
                            <stop offset="100%" stop-color="#0055ff" />
                        </linearGradient>
                        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur stdDeviation="4" result="coloredBlur" />
                            <feMerge>
                                <feMergeNode in="coloredBlur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <!-- Hexagon Border -->
                    <path d="M50 5 L90 27.5 L90 72.5 L50 95 L10 72.5 L10 27.5 Z" stroke="url(#blueGrad)"
                        stroke-width="4" fill="none" />
                    <!-- Magnifying Glass / Q logic -->
                    <circle cx="45" cy="45" r="16" stroke="#ffffff" stroke-width="5" fill="none" />
                    <circle cx="45" cy="45" r="4" fill="#00f0ff" filter="url(#glow)" />
                    <path d="M56 56 L75 75" stroke="#0055ff" stroke-width="8" stroke-linecap="square" />
                    <path d="M62 62 L82 82" stroke="#00f0ff" stroke-width="3" stroke-linecap="square" />
                    <path d="M72 82 L77 82 L77 77" stroke="#00f0ff" stroke-width="2" fill="none" />
                    <path d="M65 75 L70 75 L70 70" stroke="#0088ff" stroke-width="2" fill="none" />
                </svg>
                <div class="flex flex-col">
                    <h1 class="text-3xl font-extrabold tracking-widest uppercase text-white"
                        style="letter-spacing: 3px;">
                        Qylatrix
                    </h1>
                    <span class="text-xs font-mono text-[#00f0ff] uppercase tracking-widest"
                        style="letter-spacing: 2px;">
                        The Syntax of Safety
                    </span>
                </div>
            </div>
            <div class="text-xs font-mono text-slate-500 tracking-widest uppercase mt-4 md:mt-0">
                Offensive Security Suite v2.0
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Dictionary Generator -->
            <div class="glass-panel p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold uppercase tracking-wider text-white">Dictionary Forge</h2>
                    <span
                        class="text-xs font-mono text-[#00f0ff] border border-[#00f0ff] px-2 py-1 bg-[#00f0ff]/10">MODULE
                        01</span>
                </div>
                <div class="space-y-5">
                    <input type="text" id="dict-words" placeholder="Target basis (comma separated)"
                        class="w-full rounded p-3 text-white">
                    <button onclick="generateDict()" class="w-full btn-qylatrix py-3 rounded">Synthesize Logic</button>
                    <div id="dict-result" class="hidden mt-4 terminal-output text-sm text-[#00f0ff]"></div>
                </div>
            </div>

            <!-- Strength Analyzer -->
            <div class="glass-panel p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold uppercase tracking-wider text-white">Entropy Analyzer</h2>
                    <span
                        class="text-xs font-mono text-[#00f0ff] border border-[#00f0ff] px-2 py-1 bg-[#00f0ff]/10">MODULE
                        02</span>
                </div>
                <div class="space-y-5">
                    <input type="password" id="analyze-pwd" placeholder="Input string for entropy evaluation"
                        class="w-full rounded p-3 text-white">
                    <button onclick="analyzePwd()" class="w-full btn-qylatrix py-3 rounded">Evaluate Hardness</button>
                    <div id="analyze-result" class="hidden mt-4 space-y-3 terminal-output text-sm"></div>
                </div>
            </div>

            <!-- Brute Force Simulator -->
            <div class="glass-panel p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold uppercase tracking-wider text-white">Brute-Force Matrices</h2>
                    <span
                        class="text-xs font-mono text-[#00f0ff] border border-[#00f0ff] px-2 py-1 bg-[#00f0ff]/10">MODULE
                        03</span>
                </div>
                <div class="space-y-5">
                    <input type="text" id="brute-pwd" placeholder="Hypothetical password structure"
                        class="w-full rounded p-3 text-white">
                    <button onclick="simulateBruteForce()" class="w-full btn-qylatrix py-3 rounded">Compute TTK</button>
                    <div id="brute-result" class="hidden mt-4 terminal-output text-sm text-[#e2e8f0]"></div>
                </div>
            </div>

            <!-- Hash Extractor Sim -->
            <div class="glass-panel p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold uppercase tracking-wider text-white">Hive Extraction</h2>
                    <span
                        class="text-xs font-mono text-[#00f0ff] border border-[#00f0ff] px-2 py-1 bg-[#00f0ff]/10">MODULE
                        04</span>
                </div>
                <div class="space-y-5">
                    <select id="os-type" class="w-full rounded p-3 text-white">
                        <option value="linux">UNIX (/etc/shadow bypass)</option>
                        <option value="windows">WIN (SAM/SYSTEM hive dump)</option>
                    </select>
                    <button onclick="extractHashes()" class="w-full btn-qylatrix py-3 rounded">Initiate
                        Extraction</button>
                    <div id="extract-result"
                        class="hidden mt-4 terminal-output text-xs text-slate-400 overflow-x-auto whitespace-pre"></div>
                </div>
            </div>

            <!-- Report Generator -->
            <div class="glass-panel p-8 lg:col-span-2 border-t-4 border-t-[#0077ff]">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold uppercase tracking-wider text-white">Audit Report Generation</h2>
                    <span
                        class="text-xs font-mono text-[#00f0ff] border border-[#00f0ff] px-2 py-1 bg-[#00f0ff]/10">FINAL
                        PHASE</span>
                </div>
                <div class="space-y-5">
                    <textarea id="report-pwds" rows="4" placeholder="Input target payload strings (line separated)..."
                        class="w-full rounded p-3 text-white"></textarea>
                    <button onclick="generateReport()"
                        class="w-full bg-[#0077ff] hover:bg-[#0055ff] border border-[#00f0ff] text-white font-bold py-4 rounded transition-colors uppercase tracking-widest shadow-[0_0_15px_rgba(0,119,255,0.4)]">Generate
                        Executive Brief</button>
                    <div id="report-result"
                        class="hidden mt-6 p-8 bg-[#020617] rounded text-sm text-slate-300 border border-slate-800 prose prose-invert max-w-none font-mono">
                    </div>
                </div>
            </div>

        </div>

        <footer class="text-center py-8 text-xs font-mono text-slate-600 uppercase border-t border-slate-800">
            &copy; 2026 Qylatrix Industries. The Syntax of Safety.
        </footer>
    </div>

    <!-- Scripts -->
    <script>
        async function fetchAPI(endpoint, payload) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return res.json();
        }

        async function generateDict() {
            const words = document.getElementById('dict-words').value.split(',').map(w => w.trim()).filter(Boolean);
            if (words.length === 0) return;
            const res = await fetchAPI('/api/generate_dict', { words });
            const div = document.getElementById('dict-result');
            div.innerHTML = `> Executing mutation algorithms...<br>> ${res.count} permutations mapped.<br>> Output routed to: <span class="text-white">${res.file}</span>`;
            div.classList.remove('hidden');
        }

        async function analyzePwd() {
            const password = document.getElementById('analyze-pwd').value;
            if (!password) return;
            const data = await fetchAPI('/api/analyze', { password });
            const div = document.getElementById('analyze-result');
            let recs = data.recommendations.map(r => `<li>[-] ${r}</li>`).join('');

            // Re-map colors to cyan/blue
            let color = data.result.score > 2 ? 'text-[#00f0ff]' : 'text-[#ff4444]'; // Kept red only for actual danger indication, else cyan

            div.innerHTML = `
                <div class="flex justify-between border-b border-slate-800 pb-2">
                    <span class="text-slate-500">THREAT SCORE:</span>
                    <span class="${color} font-bold">[ ${data.result.score} / 4 ]</span>
                </div>
                <div class="flex justify-between border-b border-slate-800 py-2">
                    <span class="text-slate-500">ENTROPY VALUE:</span>
                    <span class="text-white">${data.result.math_entropy_bits.toFixed(1)} bits</span>
                </div>
                <div class="flex justify-between py-2">
                    <span class="text-slate-500">EST. COMPROMISE TIME:</span>
                    <span class="text-white">${data.result.crack_times_display.offline_fast_hashing_1e10_per_second || 'Unknown'}</span>
                </div>
                ${recs ? `<div class="mt-4 text-slate-400 border-t border-slate-800 pt-2 font-mono text-xs">VULNERABILITY PATCH NOTES:<ul class="mt-2 space-y-1">${recs}</ul></div>` : ''}
            `;
            div.classList.remove('hidden');
        }

        async function simulateBruteForce() {
            const password = document.getElementById('brute-pwd').value;
            if (!password) return;
            const data = await fetchAPI('/api/brute_force', { password, hash_type: 'ntlm' });
            const div = document.getElementById('brute-result');
            div.innerHTML = `> Matrix size: ${data.combinations.toLocaleString()}<br>> Hardware acceleration: ${data.assumed_hash_rate.toLocaleString()} H/s (ASIC Array)<br>> TIME-TO-CRACK (TTC): <span class="text-[#00f0ff] font-bold text-lg">${data.formatted_time}</span>`;
            div.classList.remove('hidden');
        }

        async function extractHashes() {
            const os_type = document.getElementById('os-type').value;
            const data = await fetchAPI('/api/extract', { os_type });
            const div = document.getElementById('extract-result');
            div.textContent = `> Bypassing Kernel protections...\n> Dumping memory hives...\n\n` + JSON.stringify(data.accounts, null, 2);
            div.classList.remove('hidden');
        }

        async function generateReport() {
            const lines = document.getElementById('report-pwds').value.split('\n').map(w => w.trim()).filter(Boolean);
            if (lines.length === 0) return;
            const data = await fetchAPI('/api/report', { passwords: lines });
            const div = document.getElementById('report-result');

            let html = data.markdown
                .replace(/^# (.*)/gm, '<h1 class="text-2xl font-bold mb-6 text-white uppercase border-b border-[#00f0ff] pb-2">$1</h1>')
                .replace(/^## (.*)/gm, '<h2 class="text-lg font-bold mt-8 mb-4 text-[#0077ff] uppercase tracking-widest">$1</h2>')
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>')
                .replace(/`(.*?)`/g, '<code class="bg-slate-900 border border-slate-800 text-[#00f0ff] px-1 rounded">$1</code>')
                .replace(/\n\n/g, '<br><br>')
                .replace(/^- (.*)/gm, '<li class="ml-4 text-slate-400 mb-1">$1</li>')
                .replace(/\|(.*)\|/g, function (match) {
                    // Simple table formatting
                    return `<div class="py-1 border-b border-slate-800 text-xs">${match.replace(/\|/g, '<span class="mx-2 text-slate-700">|</span>')}</div>`;
                });

            div.innerHTML = html;
            div.classList.remove('hidden');
        }
    </script>
</body>

</html>
